<!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>
    <style>
        table {
            border-collapse: separate;
            border-spacing: 5px;
        }

        th, td {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 0.5rem;
        }

        tr:nth-child(odd) {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <h2>Student Information</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>John</td>
            <td>18</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Mary</td>
            <td>17</td>
            <td>B</td>
        </tr>
        <tr>
            <td>David</td>
            <td>18</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>Sophia</td>
            <td>17</td>
            <td>A</td>
        </tr>
    </table>

</body>
</html>
